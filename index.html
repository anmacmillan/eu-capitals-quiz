<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Euro Quest: Capital Explorer!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Spectral:wght@400;700;800&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      /* Olde World Map (default) */
      --primary: #6b4226; --primary-dark: #4a2e1a; --primary-light: #8b6340;
      --secondary: #2d5016; --secondary-dark: #1a3a0a;
      --success: #2d5016; --danger: #8b1a1a;
      --bg: #f0e4d0; --card: #f5eddf; --text: #3d2b1f; --text2: #8b7355;
      --font: "Spectral", serif; --radius: 12px;
      --xp-color: #6b4226;
      --sea: #c5d5c0; --land-eu: #d4c4a0; --land-eu-stroke: #8b7355;
      --land-context: #e0d8c8; --land-context-stroke: #b8ad98;
    }
    [data-theme="agent"] {
      --primary: #00ff41; --primary-dark: #00cc33; --primary-light: #33ff66;
      --secondary: #00ff41; --secondary-dark: #00cc33;
      --success: #00ff41; --danger: #ff0040;
      --bg: #0a0e0a; --card: #0d120d; --text: #00ff41; --text2: #1a6b2a;
      --xp-color: #00ff41; --radius: 4px;
      --sea: #060a06; --land-eu: #0d2b0d; --land-eu-stroke: #00ff4155;
      --land-context: #0a140a; --land-context-stroke: #00ff4122;
    }

    /* Olde World Map parchment overrides */
    #europe-map { border: 2px solid var(--land-eu-stroke); }
    .topbar { border-bottom: 1px solid #c4b08855; }
    .info-panel, .hud-prompt, .mc-overlay .mc-prompt, .drawer, .end-card {
      border: 1px solid #c4b08844;
    }

    /* Agent / Palantir surveillance overrides */
    [data-theme="agent"] #europe-map { border: 1px solid #00ff4133; }
    [data-theme="agent"] .topbar { border-bottom: 1px solid #00ff4122; }
    [data-theme="agent"] .theme-row { border-bottom: 1px solid #00ff4111; }
    [data-theme="agent"] .eu-country:hover, [data-theme="agent"] .eu-country.hover { fill: #1a4d1a; }
    [data-theme="agent"] .eu-country.teach-highlight { fill: #00ff41 !important; stroke: #00ff41; }
    [data-theme="agent"] .info-panel, [data-theme="agent"] .hud-prompt,
    [data-theme="agent"] .mc-overlay .mc-prompt, [data-theme="agent"] .drawer,
    [data-theme="agent"] .end-card {
      border: 1px solid #00ff4133; box-shadow: 0 0 30px #00ff4111;
    }
    [data-theme="agent"] .mc-btn { border-color: #00ff4122; background: #0d120d; color: #00ff41; }
    [data-theme="agent"] .mc-btn.correct { background: #00ff41; color: #000; }
    [data-theme="agent"] .mc-btn.wrong { background: #ff0040; color: #fff; }
    [data-theme="agent"] .btn { background: #00ff41; color: #000; box-shadow: 0 3px 0 #00cc33; }
    [data-theme="agent"] .topbar-btn { border-color: #00ff41; color: #00ff41; }
    [data-theme="agent"] .topbar-btn:hover, [data-theme="agent"] .topbar-btn.active { background: #00ff41; color: #000; }
    [data-theme="agent"] .region-pill { border-color: #00ff4144; color: #00ff41; }
    [data-theme="agent"] .region-pill.active { background: #00ff41; color: #000; border-color: #00ff41; }
    [data-theme="agent"] .xp-bar { background: #0a0e0a; border-top: 1px solid #00ff4122; }
    [data-theme="agent"] .xp-outer { background: #112211; }
    [data-theme="agent"] .mode-btn { border-color: #00ff4122; }
    [data-theme="agent"] .mode-btn:hover { border-color: #00ff41; }
    [data-theme="agent"] .country-label { fill: #00ff41; }
    /* Scanline overlay for agent theme */
    [data-theme="agent"] .map-wrap::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, #00ff4108 2px, #00ff4108 4px);
      border-radius: var(--radius);
    }

    /* ===== TEACH MODE ===== */
    .teach-panel {
      position: absolute; bottom: 6px; left: 6px; right: 6px;
      background: var(--card); border-radius: var(--radius);
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15); display: none;
      z-index: 35; border: 1px solid rgba(0,0,0,.06);
    }
    .teach-panel.show { display: flex; align-items: center; gap: 10px; animation: slideUp .2s ease; flex-wrap: wrap; }
    .teach-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .teach-flag { font-size: 1.8rem; flex-shrink: 0; }
    .teach-texts { min-width: 0; }
    .teach-name { font-size: 1rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .teach-capital { font-size: .85rem; color: var(--primary); font-weight: 700; }
    .teach-detail { font-size: .7rem; color: var(--text2); }
    .teach-nav { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .teach-nav .btn { padding: 6px 14px; font-size: .85rem; margin: 0; }
    .teach-nav .exit-btn { padding: 4px 10px; font-size: .7rem; background: var(--text2); box-shadow: none; margin: 0; }
    .teach-progress { display: flex; gap: 3px; width: 100%; justify-content: center; }
    .teach-dot {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,.1);
      transition: all .2s; flex-shrink: 0;
    }
    .teach-dot.seen { background: var(--primary); opacity: .5; }
    .teach-dot.current { background: var(--primary); transform: scale(1.3); opacity: 1; }
    [data-theme="agent"] .teach-panel { border: 1px solid #00ff4133; box-shadow: 0 0 20px #00ff4111; }

    /* Region progress cards */
    .region-progress { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .region-card {
      padding: 12px; border-radius: var(--radius); border: 2px solid rgba(0,0,0,.08);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .region-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .region-card .rname { font-weight: 800; font-size: .95rem; }
    .region-card .rcount { font-size: .75rem; color: var(--text2); margin: 2px 0; }
    .region-card .rbar { height: 6px; background: rgba(0,0,0,.08); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .region-card .rbar-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s; }
    .region-card.complete { border-color: var(--success); }
    .region-card.complete .rbar-fill { background: var(--success); }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent; overflow-x: hidden;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--card); border-bottom: 1px solid rgba(0,0,0,.06);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar h1 { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
    .topbar-btns { display: flex; gap: 6px; }
    .topbar-btn {
      padding: 6px 12px; border-radius: 8px; border: 2px solid var(--primary);
      background: transparent; color: var(--primary); font-weight: 800;
      font-family: inherit; font-size: .85rem; cursor: pointer;
      transition: all .2s;
    }
    .topbar-btn:hover, .topbar-btn.active { background: var(--primary); color: #fff; }
    .topbar-btn.sm { padding: 4px 8px; font-size: .75rem; }

    /* ===== THEME PILLS ===== */
    .theme-row {
      display: flex; justify-content: center; gap: 6px; padding: 6px;
      background: var(--card); border-bottom: 1px solid rgba(0,0,0,.04);
    }
    .theme-pill {
      padding: 4px 12px; border-radius: 20px; border: 2px solid transparent;
      font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit;
      background: transparent; color: var(--text2); transition: all .2s;
    }
    .theme-pill.active { border-color: var(--primary); color: var(--primary); background: var(--card); }

    /* ===== MAP ===== */
    .map-wrap {
      flex: 1; position: relative; display: flex; align-items: center;
      justify-content: center; padding: 4px; min-height: 0;
    }
    #europe-map {
      width: 100%; height: 100%; max-height: calc(100vh - 130px); max-height: calc(100dvh - 130px);
      background: var(--sea); border-radius: var(--radius); overflow: hidden;
      transition: viewBox .5s ease;
    }
    .eu-country { fill: var(--land-eu); stroke: var(--land-eu-stroke); stroke-width: 0.8; cursor: pointer; transition: fill .2s, opacity .15s; }
    .eu-country:hover, .eu-country.hover { fill: var(--primary-light); }
    .eu-country.correct { fill: var(--success) !important; stroke-width: 2; }
    .eu-country.wrong { fill: var(--danger) !important; stroke-width: 2; }
    .eu-country.reveal { fill: var(--success) !important; stroke-width: 2; opacity: .7; }
    .eu-country.dimmed { opacity: .35; }
    .eu-country.teach-highlight { fill: var(--primary) !important; stroke: var(--primary-dark); stroke-width: 2; }
    .context-country { fill: var(--land-context); stroke: var(--land-context-stroke); stroke-width: 0.5; pointer-events: none; }
    .sea-label { fill: var(--text2); font-size: 11px; font-style: italic; pointer-events: none; opacity: .4; }
    .country-label { font-size: 6px; fill: var(--text); text-anchor: middle; pointer-events: none; font-weight: 700; opacity: .8; }
    .capital-dot { fill: #1a1a2e; stroke: #fff; stroke-width: 0.5; pointer-events: none; }

    /* Small country markers */
    .small-marker { stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: r .2s; }

    /* ===== INFO PANEL (tap a country) ===== */
    .info-panel {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: var(--card); border-radius: var(--radius); padding: 12px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15); display: none; text-align: center;
      z-index: 20; min-width: 220px; max-width: 90%;
    }
    .info-panel.show { display: block; animation: slideUp .3s ease; }
    .info-flag { font-size: 2.5rem; }
    .info-name { font-size: 1.3rem; font-weight: 900; margin: 2px 0; }
    .info-capital { font-size: 1rem; color: var(--primary); font-weight: 700; }

    /* ===== GAME HUD (overlay on map) ===== */
    .game-hud {
      position: absolute; top: 8px; left: 8px; right: 8px;
      display: none; z-index: 30; pointer-events: none;
    }
    .game-hud.show { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .hud-item { background: var(--card); border-radius: 10px; padding: 6px 12px; font-weight: 800; font-size: .9rem; box-shadow: 0 2px 10px rgba(0,0,0,.1); pointer-events: auto; }
    .hud-prompt {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      background: var(--card); border-radius: var(--radius); padding: 10px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15); text-align: center; z-index: 30;
      display: none; pointer-events: none;
    }
    .hud-prompt.show { display: block; animation: slideUp .3s ease; }
    .hud-prompt .flag { font-size: 2rem; }
    .hud-prompt .text { font-size: 1.2rem; font-weight: 900; }
    .hud-prompt .sub { font-size: .85rem; color: var(--text2); font-weight: 600; }

    /* ===== PROGRESS BAR (in-game) ===== */
    .progress-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 5px; z-index: 40;
      background: rgba(0,0,0,.1); border-radius: 0 0 4px 4px;
    }
    .progress-fill { height: 100%; background: var(--primary); transition: width .3s; border-radius: 0 0 4px 4px; }

    /* ===== BOTTOM DRAWER (modes, quiz options, stats) ===== */
    .drawer {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--card); border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,.1); padding: 16px;
      z-index: 40; display: none; max-height: 70vh; overflow-y: auto;
    }
    .drawer.show { display: block; animation: slideDrawer .3s ease; }
    @keyframes slideDrawer { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .drawer-handle {
      width: 40px; height: 4px; background: #ccc; border-radius: 2px;
      margin: 0 auto 12px; cursor: pointer;
    }
    .drawer h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--primary); }

    /* ===== MODE BUTTONS ===== */
    .mode-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; }
    .mode-btn {
      padding: 12px 16px; border-radius: var(--radius); border: 3px solid rgba(0,0,0,.06);
      background: var(--card); color: var(--text); font-weight: 800; font-size: .95rem;
      font-family: inherit; cursor: pointer; transition: all .2s; text-align: center;
      flex: 1; min-width: 130px; max-width: 200px;
    }
    .mode-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
    .mode-btn .icon { font-size: 1.8rem; margin-bottom: 4px; display: block; }
    .mode-btn .desc { font-size: .7rem; color: var(--text2); }

    /* ===== MULTIPLE CHOICE (overlay) ===== */
    .mc-overlay {
      position: absolute; bottom: 12px; left: 8px; right: 8px;
      display: none; z-index: 35;
    }
    .mc-overlay.show { display: block; animation: slideUp .25s ease; }
    .mc-prompt { text-align: center; background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 12px; }
    .mc-prompt .flag { font-size: 2rem; }
    .mc-prompt .text { font-size: 1.2rem; font-weight: 900; }
    .mc-prompt .sub { font-size: .8rem; color: var(--text2); }
    .mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .mc-btn {
      padding: 14px 8px; border-radius: 0 0 var(--radius) var(--radius); border: 3px solid rgba(0,0,0,.08);
      background: var(--card); color: var(--text); font-size: 1rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .15s; text-align: center;
    }
    .mc-btn:first-child { border-radius: 0; }
    .mc-btn:nth-child(2) { border-radius: 0; }
    .mc-btn:nth-child(3) { border-radius: 0 0 0 var(--radius); }
    .mc-btn:nth-child(4) { border-radius: 0 0 var(--radius) 0; }
    .mc-btn:active { transform: scale(.97); }
    .mc-btn.correct { background: var(--success); color: #fff; border-color: var(--success); }
    .mc-btn.wrong { background: var(--danger); color: #fff; border-color: var(--danger); }
    .mc-btn.show-correct { border-color: var(--success); box-shadow: 0 0 8px rgba(16,185,129,.3); }
    .mc-btn.disabled { pointer-events: none; opacity: .5; }

    /* ===== REGION PILLS ===== */
    .region-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
    .region-pill {
      padding: 5px 14px; border-radius: 50px; border: 2px solid var(--text2);
      background: transparent; color: var(--text); font-weight: 700; font-size: .8rem;
      font-family: inherit; cursor: pointer; transition: all .2s;
    }
    .region-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 6px; margin: 10px 0; max-height: 300px; overflow-y: auto; padding: 4px;
    }
    .stat-card {
      padding: 8px; border-radius: 10px; text-align: center; font-size: .8rem; font-weight: 700;
    }
    .stat-card .sf { font-size: 1.3rem; }
    .stat-card .sn { font-size: .7rem; }
    .stat-card .sc { font-size: .6rem; color: var(--text2); }
    .box-mastered { background: #d1fae5; color: #065f46; border: 2px solid #10b981; }
    .box-good { background: #dbeafe; color: #1e40af; border: 2px solid #60a5fa; }
    .box-learning { background: #fef3c7; color: #92400e; border: 2px solid #f59e0b; }
    .box-struggling { background: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }
    .box-new { background: #f3f4f6; color: #6b7280; border: 2px solid #d1d5db; }

    /* ===== SUMMARY STATS ===== */
    .summary-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
    .summary-box { text-align: center; flex: 1; padding: 10px; border-radius: var(--radius); background: rgba(0,0,0,.03); }
    .summary-box .big { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
    .summary-box .lbl { font-size: .75rem; color: var(--text2); font-weight: 600; }

    /* ===== END SCREEN ===== */
    .end-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      display: none; z-index: 50; align-items: center; justify-content: center;
    }
    .end-overlay.show { display: flex; }
    .end-card {
      background: var(--card); border-radius: var(--radius); padding: 24px;
      max-width: 400px; width: 90%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.2);
      animation: slideUp .4s ease;
    }
    .end-card h2 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
    .end-mistakes { text-align: left; margin: 10px 0; max-height: 150px; overflow-y: auto; }
    .end-mistake { padding: 6px 10px; margin: 3px 0; border-radius: 8px; background: rgba(239,68,68,.08); font-size: .85rem; }

    /* ===== XP BAR ===== */
    .xp-bar {
      display: flex; align-items: center; padding: 4px 10px; background: rgba(0,0,0,.12);
      backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,.1); height: 30px;
    }
    .xp-outer { flex: 1; height: 10px; background: #444; border-radius: 5px; overflow: hidden; margin: 0 8px; }
    .xp-inner { height: 100%; width: 0%; background: var(--xp-color); transition: width .4s; box-shadow: 0 0 8px var(--xp-color); }
    .xp-label { font-weight: 900; font-size: .85rem; color: var(--xp-color); min-width: 60px; text-align: center; }

    /* ===== FEEDBACK ===== */
    .feedback {
      position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%) scale(0);
      font-size: 2.5rem; font-weight: 900; pointer-events: none; z-index: 100;
      text-shadow: 0 0 15px rgba(0,0,0,.2); transition: transform .25s cubic-bezier(.175,.885,.32,1.275);
    }
    .feedback.show { transform: translate(-50%,-50%) scale(1); }

    /* ===== BTN ===== */
    .btn {
      padding: 12px 24px; font-size: 1rem; font-weight: 800; font-family: inherit;
      border: none; border-radius: var(--radius); cursor: pointer; color: #fff;
      background: var(--primary); box-shadow: 0 3px 0 var(--primary-dark);
      transition: all .2s; display: inline-flex; align-items: center; gap: 6px; margin: 4px;
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
    .btn-sec { background: var(--secondary); box-shadow: 0 3px 0 var(--secondary-dark); }

    /* ===== ANIMATIONS ===== */
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

    @media(max-width:600px) {
      .topbar h1 { font-size: 1rem; }
      .mode-btn { min-width: 100px; padding: 10px 10px; font-size: .85rem; }
      .mode-btn .icon { font-size: 1.4rem; }
      .mc-btn { font-size: .9rem; padding: 12px 6px; }
      .hud-prompt .text { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1 id="app-title">Euro Quest!</h1>
    <div class="topbar-btns">
      <button class="topbar-btn" onclick="openDrawer('learn')">Learn</button>
      <button class="topbar-btn" onclick="openDrawer('play')">Test</button>
      <button class="topbar-btn" onclick="openDrawer('stats')">Progress</button>
    </div>
  </div>

  <!-- THEME ROW -->
  <div class="theme-row">
    <button class="theme-pill active" data-t="" onclick="setTheme(this)">Olde Map</button>
    <button class="theme-pill" data-t="agent" onclick="setTheme(this)">Surveillance</button>
  </div>

  <!-- MAP (landing page) -->
  <div class="map-wrap" id="map-wrap">
    <svg id="europe-map" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet"></svg>

    <!-- Info panel (explore mode) -->
    <div class="info-panel" id="info-panel">
      <div class="info-flag" id="info-flag"></div>
      <div class="info-name" id="info-name"></div>
      <div class="info-capital" id="info-capital"></div>
    </div>

    <!-- Teach panel (compact strip) -->
    <div class="teach-panel" id="teach-panel">
      <div class="teach-info">
        <div class="teach-flag" id="teach-flag"></div>
        <div class="teach-texts">
          <div class="teach-name" id="teach-name"></div>
          <div class="teach-capital" id="teach-capital"></div>
          <div class="teach-detail" id="teach-detail"></div>
        </div>
      </div>
      <div class="teach-nav">
        <button class="btn" onclick="teachPrev()">◀</button>
        <button class="btn" onclick="teachNext()" id="teach-next-btn">▶</button>
        <button class="btn exit-btn" onclick="endTeach()">✕</button>
      </div>
      <div class="teach-progress" id="teach-dots"></div>
    </div>

    <!-- Game HUD -->
    <div class="game-hud" id="game-hud">
      <div class="hud-item" id="hud-streak">Streak: 0</div>
      <div class="hud-item" id="hud-count">1/15</div>
      <div class="hud-item" id="hud-timer">0s</div>
    </div>

    ALL_COUNTRIES.forEach(c => {
      const p = SVG_PATHS[c.iso];
      if (!p) return;
      html += `<path d="${p.d}" class="eu-country" data-iso="${c.iso}" onclick="onCountryClick('${c.iso}')" ontouchend=""/>`;
    });

    // Labels group (can be hidden during quiz)
    html += '<g id="map-labels">';
    ALL_COUNTRIES.forEach(c => {
      const p = SVG_PATHS[c.iso];
      if (!p) return;
      const fs = ["MT","LU","SI","CY","ME","MK","AL","XK"].includes(c.iso) ? 5 : (["BE","NL","DK","EE","LV","LT","SK","HR","BA","MD","CH"].includes(c.iso) ? 5.5 : 6.5);
      html += `<text x="${p.cx}" y="${p.cy+2}" class="country-label" font-size="${fs}">${c.name}</text>`;
    });
    html += '</g>';

    svg.innerHTML = html;
  }

  // ==========================================
  function setScope(el) {
    S.scope = el.dataset.scope;

    document.querySelectorAll('[data-scope]').forEach(p => p.classList.toggle("active", p===el));

  function getActiveCountries() {
    return S.scope === "all" ? ALL_COUNTRIES : EU;

  function setRegion(el) {
    S.region = el.dataset.r;
    document.querySelectorAll('[data-r]').forEach(p => p.classList.toggle("active", p===el));

  function getFilteredCountries() {
    const base = getActiveCountries();
    if (S.region === "all") return [...base];
    if (S.region === "weak") {
      const scored = base.map(c => {
        const s = S.stats[c.iso];
        if (!s) return {...c, score: -1};
        return {...c, score: s.attempts > 0 ? s.correct/s.attempts : 0};
      });
      scored.sort((a,b) => a.score - b.score);
      return scored.slice(0, Math.max(10, Math.ceil(base.length/2)));
    }
    return base.filter(c => c.region === S.region);
  }

  // ==========================================
  // LAUNCH GAME (one touch!)
  // ==========================================
  function launchGame(mode) {
    closeDrawers();
    const countries = getFilteredCountries();
    if (!countries.length) { alert("No countries!"); return; }

    let pool = [];
    if (mode === "spaced") {
      // Spaced repetition: score each country by weakness
      const now = Date.now();
      const scored = getActiveCountries().map(c => {
        const s = S.stats[c.iso];
        if (!s) return { ...c, priority: 100 }; // Never seen = high priority
        const ratio = s.attempts > 0 ? s.correct / s.attempts : 0;
        const lastSeen = s.lastSeen || 0;
        const hoursSince = (now - lastSeen) / 3600000;
        // Lower ratio = higher priority; longer since seen = higher priority
        // Streak reduces priority (already being learned)
        const priority = (1 - ratio) * 50 + Math.min(hoursSince, 168) / 3 - s.streak * 5;
        return { ...c, priority };
      });
      scored.sort((a, b) => b.priority - a.priority);
      // Take top countries, mix question types
      const pick = scored.slice(0, ROUND_SIZE);
      const modes = ["capital", "country", "mapquiz"];
      pick.forEach(c => {
        const m = modes[Math.floor(Math.random() * modes.length)];
        pool.push({ ...c, mode: m });
      });
    } else {
      const modes = mode === "mix" ? ["capital","country","flag","mapquiz"] : [mode];
      countries.forEach(c => modes.forEach(m => pool.push({...c, mode: m})));
    }
    // Shuffle
    for (let i = pool.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }

    S.queue = pool.slice(0, ROUND_SIZE);
    S.qi = 0; S.correct = 0; S.streak = 0; S.bestStreak = 0;
    S.mistakes = []; S.mode = mode; S.playing = true; S.answering = false;

    // UI
    document.getElementById("info-panel").classList.remove("show");
    document.getElementById("progress-bar").style.display = "block";
    document.getElementById("game-hud").classList.add("show");

    // Hide labels during map quiz (too easy otherwise!)
    const labels = document.getElementById("map-labels");
    if (labels) labels.style.display = (mode === "mapquiz" || mode === "mix" || mode === "spaced") ? "none" : "";

    startTimer();
    nextQuestion();
  }

  // ==========================================
  // NEXT QUESTION
  // ==========================================
  function nextQuestion() {
    if (S.qi >= S.queue.length) return finishGame();
    S.answering = true;
    S.qStart = Date.now();

    const q = S.queue[S.qi];
    updateHUD();

    // Reset map highlights and zoom
    resetZoom();
    document.querySelectorAll(".eu-country").forEach(el => {
      el.classList.remove("correct","wrong","reveal","dimmed","hover");
      el.style.fill = "";
    });

    if (q.mode === "mapquiz") {
      showMapQuiz(q);
    } else {
      showMCQuiz(q);
    }
  }

  // ==========================================
  // MAP QUIZ
  // ==========================================
  function showMapQuiz(q) {
    document.getElementById("mc-overlay").classList.remove("show");
    const prompt = document.getElementById("hud-prompt");
    document.getElementById("prompt-flag").textContent = q.flag;
    document.getElementById("prompt-text").textContent = `Find ${q.name}!`;
    document.getElementById("prompt-sub").textContent = `Capital: ${q.capital}`;
    prompt.classList.add("show");
  }

  function handleMapAnswer(iso) {
    if (!S.answering) return;
    S.answering = false;
    const q = S.queue[S.qi];
    const isCorrect = iso === q.iso;
    const timeTaken = (Date.now() - S.qStart) / 1000;

    const clicked = document.querySelector(`.eu-country[data-iso="${iso}"]`);
    const correct = document.querySelector(`.eu-country[data-iso="${q.iso}"]`);

    if (isCorrect) {
      S.correct++; S.streak++;
      if (S.streak > S.bestStreak) S.bestStreak = S.streak;
      clicked?.classList.add("correct");
      let xp = 10; if (S.streak >= 5) xp += 5; if (timeTaken < 3) xp += 5;
      addXP(xp);
      showFeedback(true);
      updateStat(q.iso, true);
      if (S.streak % 5 === 0) fireConfetti();
    } else {
      S.streak = 0;
      clicked?.classList.add("wrong");
      correct?.classList.add("reveal");
      showFeedback(false);
      updateStat(q.iso, false);
      S.mistakes.push(q);
    }

    S.qi++;
    setTimeout(() => {
      document.getElementById("hud-prompt").classList.remove("show");
      nextQuestion();
    }, isCorrect ? 800 : 2000);
  }

  // ==========================================
  // MAP ZOOM
  // ==========================================
  const DEFAULT_VB = "0 0 1000 800";
  function zoomToCountry(iso, padding) {
    padding = padding || 80;
    const el = document.querySelector(`.eu-country[data-iso="${iso}"]`);
    if (!el) return;
    const bbox = el.getBBox();
    const svg = document.getElementById("europe-map");
    const vx = Math.max(0, bbox.x - padding);
    const vy = Math.max(0, bbox.y - padding);
    const vw = Math.min(1000, bbox.width + padding * 2);
    const vh = Math.min(800, bbox.height + padding * 2);
    svg.setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
    svg.style.transition = "all .5s ease";
  }
  function resetZoom() {
    const svg = document.getElementById("europe-map");
    svg.setAttribute("viewBox", DEFAULT_VB);
    svg.style.transition = "all .4s ease";
    // Remove any capital markers
    document.querySelectorAll(".capital-highlight").forEach(e => e.remove());
  }
  function showCapitalDot(iso) {

  // ==========================================
  // MULTIPLE CHOICE QUIZ
  // ==========================================
  function showMCQuiz(q) {
    document.getElementById("hud-prompt").classList.remove("show");
    const overlay = document.getElementById("mc-overlay");
    const flag = document.getElementById("mc-flag");
    const text = document.getElementById("mc-text");
    const sub = document.getElementById("mc-sub");
    const grid = document.getElementById("mc-grid");

    let correctAnswer, field;
    if (q.mode === "capital") {
      flag.textContent = q.flag;
      text.textContent = q.name;
      sub.textContent = "What is the capital?";
      correctAnswer = q.capital; field = "capital";
    } else if (q.mode === "country") {
      flag.textContent = "🏛️";
      text.textContent = q.capital;
      sub.textContent = "Which country?";
      correctAnswer = q.name; field = "name";
    } else {
      flag.textContent = q.flag;
      text.textContent = ""; sub.textContent = "Which country?";
      correctAnswer = q.name; field = "name";
    }

    // Zoom to country + highlight for capital questions
    if (q.mode === "capital") {
      document.querySelector(`.eu-country[data-iso="${q.iso}"]`)?.classList.add("hover");
      zoomToCountry(q.iso, 60);
      showCapitalDot(q.iso);
    }

    const opts = generateOptions(correctAnswer, field);
    grid.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "mc-btn";
      btn.textContent = opt;
      btn.onclick = () => handleMCAnswer(btn, opt, correctAnswer, q);
      grid.appendChild(btn);
    });
    overlay.classList.add("show");
  }

  function generateOptions(correct, field) {
    const all = getActiveCountries().map(c => c[field]);
    const opts = [correct];
    while (opts.length < 4) {
      const r = all[Math.floor(Math.random()*all.length)];
      if (!opts.includes(r)) opts.push(r);
    }
    for (let i = opts.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    return opts;
  }

  function handleMCAnswer(btn, selected, correct, q) {
    if (!S.answering) return;
    S.answering = false;
    const timeTaken = (Date.now() - S.qStart) / 1000;
    const isCorrect = selected === correct;
    const allBtns = document.querySelectorAll(".mc-btn");

    if (isCorrect) {
      S.correct++; S.streak++;
      if (S.streak > S.bestStreak) S.bestStreak = S.streak;
      btn.classList.add("correct");
      allBtns.forEach(b => { if (b!==btn) b.classList.add("disabled"); });
      let xp = 10; if (S.streak >= 5) xp += 5; if (timeTaken < 3) xp += 5;
      addXP(xp);
      showFeedback(true);
      updateStat(q.iso, true);
      if (S.streak % 5 === 0) fireConfetti();
    } else {
      S.streak = 0;
      btn.classList.add("wrong");
      allBtns.forEach(b => { if (b.textContent===correct) b.classList.add("show-correct"); else if (b!==btn) b.classList.add("disabled"); });
      showFeedback(false);
      updateStat(q.iso, false);
      S.mistakes.push(q);
    }

    S.qi++;
    setTimeout(() => {
      document.getElementById("mc-overlay").classList.remove("show");
      document.querySelectorAll(".eu-country").forEach(el => el.classList.remove("hover"));
      nextQuestion();
    }, isCorrect ? 800 : 2000);
  }

  // ==========================================
  // FINISH GAME
  // ==========================================
  function finishGame() {
    S.playing = false;
    stopTimer();
    resetZoom();
    document.getElementById("game-hud").classList.remove("show");
    document.getElementById("hud-prompt").classList.remove("show");
    document.getElementById("mc-overlay").classList.remove("show");
    document.getElementById("progress-bar").style.display = "none";
    // Restore labels
    const labels = document.getElementById("map-labels");
    if (labels) labels.style.display = "";
    recolourMap();

    const total = S.queue.length;
    const pct = total ? Math.round(S.correct/total*100) : 0;
    document.getElementById("end-correct").textContent = S.correct+"/"+total;
    document.getElementById("end-pct").textContent = pct+"%";
    document.getElementById("end-streak").textContent = S.bestStreak;

    const titles = pct >= 90 ? ["Geography Genius!","Map Master!","Capital Expert!"]
      : pct >= 70 ? ["Great Explorer!","Well Travelled!"]
      : pct >= 50 ? ["Keep Exploring!","Good Effort!"]
      : ["Keep Practising!","Try Again!"];
    document.getElementById("end-title").textContent = titles[Math.floor(Math.random()*titles.length)];

    if (pct >= 90) { addXP(50); document.getElementById("end-xp").textContent = "+50 Bonus XP!"; fireConfetti(); }
    else if (pct >= 70) { addXP(20); document.getElementById("end-xp").textContent = "+20 Bonus XP!"; }
    else { document.getElementById("end-xp").textContent = ""; }

    const mEl = document.getElementById("end-mistakes");
    if (S.mistakes.length) {
      mEl.innerHTML = "<p style=\"font-weight:800;margin-bottom:6px\">Review:</p>" +
        S.mistakes.map(m => `<div class="end-mistake">${m.flag} <b>${m.name}</b> — ${m.capital}</div>`).join("");
    } else {
      mEl.innerHTML = "<p style=\"color:var(--success);font-weight:800\">Perfect round!</p>";
    }

    document.getElementById("end-overlay").classList.add("show");
  }

  function endGame() {
    document.getElementById("end-overlay").classList.remove("show");
    resetZoom();
    recolourMap();
    // Restore labels
    const labels = document.getElementById("map-labels");
    if (labels) labels.style.display = "";
  }

  // ==========================================
  // TEACH MODE (guided learning)
  // ==========================================
  function getRegions() {
    const src = getActiveCountries();
    return {
      northern: { name: "Northern Europe", emoji: "❄️", countries: src.filter(c => c.region === "northern") },
      western: { name: "Western Europe", emoji: "🏰", countries: src.filter(c => c.region === "western") },
      southern: { name: "Southern Europe", emoji: "☀️", countries: src.filter(c => c.region === "southern") },
      eastern: { name: "Eastern Europe", emoji: "🏔️", countries: src.filter(c => c.region === "eastern") }
    };
  }

  let teachState = { list: [], index: 0, active: false };

  function renderLearnRegions() {
    const el = document.getElementById("learn-regions");
    el.innerHTML = "";
    const regions = getRegions();
    // Update "All Countries" button count
    const learnDesc = document.getElementById("learn-all-desc");
    if (learnDesc) learnDesc.textContent = "Full tour — all " + getActiveCountries().length;
    for (const [key, reg] of Object.entries(regions)) {
      const total = reg.countries.length;
      const mastered = reg.countries.filter(c => getBox(c.iso) === "mastered" || getBox(c.iso) === "good").length;
      const pct = total > 0 ? Math.round(mastered / total * 100) : 0;
      const card = document.createElement("div");
      card.className = "region-card" + (pct >= 100 ? " complete" : "");
      card.onclick = () => { closeDrawers(); startTeach(key); };
      card.innerHTML = `
        <div class="rname">${reg.emoji} ${reg.name}</div>
        <div class="rcount">${mastered}/${total} learned</div>
        <div class="rbar"><div class="rbar-fill" style="width:${pct}%"></div></div>
      `;
      el.appendChild(card);
    }
  }

  function startTeach(regionKey) {
    closeDrawers();
    if (regionKey === "all") {
      teachState.list = [...getActiveCountries()];
    } else {
      teachState.list = getRegions()[regionKey].countries;
    }
    teachState.index = 0;
    teachState.active = true;
    S.playing = false; // not a quiz

    // Dim all countries, we'll highlight as we go
    document.querySelectorAll(".eu-country").forEach(el => el.classList.add("dimmed"));
    document.getElementById("info-panel").classList.remove("show");
    showTeachCard();
  }

  function showTeachCard() {
    const c = teachState.list[teachState.index];
    const p = SVG_PATHS[c.iso];

    // Update panel
    document.getElementById("teach-flag").textContent = c.flag;
    document.getElementById("teach-name").textContent = c.name;
    document.getElementById("teach-capital").textContent = "Capital: " + c.capital;
    document.getElementById("teach-detail").textContent = `${c.region.charAt(0).toUpperCase() + c.region.slice(1)} Europe — ${teachState.index + 1} of ${teachState.list.length}`;
    document.getElementById("teach-panel").classList.add("show");

    // Update next button
    const nextBtn = document.getElementById("teach-next-btn");
    nextBtn.textContent = teachState.index < teachState.list.length - 1 ? "▶" : "✓";

    // Progress dots
    const dots = document.getElementById("teach-dots");
    dots.innerHTML = "";
    teachState.list.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.className = "teach-dot" + (i < teachState.index ? " seen" : "") + (i === teachState.index ? " current" : "");
      dots.appendChild(dot);
    });

    // Highlight on map
    document.querySelectorAll(".eu-country").forEach(el => {
      el.classList.remove("teach-highlight");
      // Show previously visited as slightly visible
      const idx = teachState.list.findIndex(tc => tc.iso === el.dataset.iso);
      if (idx >= 0 && idx <= teachState.index) {
        el.classList.remove("dimmed");
      }
    });
    document.querySelector(`.eu-country[data-iso="${c.iso}"]`)?.classList.add("teach-highlight");
    document.querySelector(`.eu-country[data-iso="${c.iso}"]`)?.classList.remove("dimmed");

    // Zoom to country
    zoomToCountry(c.iso, 70);
    // Show capital dot
    document.querySelectorAll(".capital-highlight").forEach(e => e.remove());
    showCapitalDot(c.iso);
  }

  function teachNext() {
    if (teachState.index < teachState.list.length - 1) {
      teachState.index++;
      showTeachCard();
    } else {
      endTeach();
      fireConfetti();
    }
  }

  function teachPrev() {
    if (teachState.index > 0) {
      teachState.index--;
      showTeachCard();
    }
  }

  function endTeach() {
    teachState.active = false;
    document.getElementById("teach-panel").classList.remove("show");
    resetZoom();
    document.querySelectorAll(".eu-country").forEach(el => {
      el.classList.remove("dimmed", "teach-highlight");
    });
    document.querySelectorAll(".capital-highlight").forEach(e => e.remove());
  }

  // ==========================================
  // HUD
  // ==========================================
  function updateHUD() {
    document.getElementById("hud-streak").textContent = "Streak: " + S.streak;
    document.getElementById("hud-count").textContent = (S.qi+1)+"/"+S.queue.length;
    document.getElementById("progress-fill").style.width = (S.qi/S.queue.length*100)+"%";
  }

  function startTimer() {
    S.tStart = Date.now();
    S.tInterval = setInterval(() => {
      document.getElementById("hud-timer").textContent = Math.floor((Date.now()-S.tStart)/1000)+"s";
    }, 1000);
  }
  function stopTimer() { clearInterval(S.tInterval); }

  // ==========================================
  // STATS
  // ==========================================
  function updateStat(iso, correct) {
    const s = S.stats[iso] || {attempts:0,correct:0,streak:0,lastSeen:0,recent:[]};
    if (!s.recent) s.recent = [];
    s.attempts++;
    s.lastSeen = Date.now();
    if (correct) { s.correct++; s.streak++; } else { s.streak = 0; }
    s.recent.push(correct ? 1 : 0);
    if (s.recent.length > 10) s.recent.shift();
    S.stats[iso] = s;
    localStorage.setItem(STORAGE+"stats", JSON.stringify(S.stats));
  }

  function getBox(iso) {
    const s = S.stats[iso];
    if (!s) return "new";
    const recent = s.recent && s.recent.length > 0 ? s.recent : [];
    const r = recent.length > 0 ? recent.reduce((a,b)=>a+b,0)/recent.length
      : (s.attempts > 0 ? s.correct/s.attempts : 0);
    if (s.streak >= 3 && r >= .8) return "mastered";
    if (r >= .7) return "good";
    if (r >= .4) return "learning";
    if (s.attempts > 0) return "struggling";
    return "new";
  }

  function renderStats() {
    const grid = document.getElementById("stats-grid");
    grid.innerHTML = "";
    let mastered=0, learning=0, notStarted=0;
    getActiveCountries().forEach(c => {
      const box = getBox(c.iso);
      const s = S.stats[c.iso];
      if (box==="mastered") mastered++;
      else if (box==="new") notStarted++;
      else learning++;
      const card = document.createElement("div");
      card.className = "stat-card box-"+box;
      card.innerHTML = `<div class="sf">${c.flag}</div><div class="sn">${c.name}</div><div class="sc">${c.capital}</div>${s?`<div style="font-size:.6rem;margin-top:2px">${s.correct}/${s.attempts}</div>`:""}`;
      grid.appendChild(card);
    });
    document.getElementById("s-mastered").textContent = mastered;
    document.getElementById("s-learning").textContent = learning;
    document.getElementById("s-new").textContent = notStarted;
  }

  function toggleStatsView(view) {
    if (view === "map") {
      closeDrawers();
      // Colour map by mastery
      const colors = {mastered:"#10b981",good:"#60a5fa",learning:"#f59e0b",struggling:"#ef4444",new:"#9ca3af"};
      document.querySelectorAll(".eu-country").forEach(el => {
        const iso = el.dataset.iso;
        el.style.fill = colors[getBox(iso)] || "";
      });
    } else {
      renderStats();
    }
  }

  function resetProgress() {
    if (confirm("Reset all progress?")) {
      S.stats = {}; S.xp = 0;
      localStorage.removeItem(STORAGE+"stats");
      localStorage.removeItem(STORAGE+"xp");
      updateXP(); renderStats(); recolourMap();
    }
  }

  // ==========================================
  // XP
  // ==========================================
  function addXP(n) {
    const oldLvl = Math.floor(S.xp/100)+1;
    S.xp += n;
    localStorage.setItem(STORAGE+"xp", S.xp);
    updateXP();
    if (Math.floor(S.xp/100)+1 > oldLvl) fireConfetti();
  }
  function updateXP() {
    const lvl = Math.floor(S.xp/100)+1;
    const inLvl = S.xp%100;
    document.getElementById("xp-level").textContent = "LVL "+lvl;
    document.getElementById("xp-text").textContent = inLvl+"/100";
    document.getElementById("xp-fill").style.width = inLvl+"%";
  }

  // ==========================================
  // FEEDBACK
  // ==========================================
  const FB = {
    "":{y:["Excellent!","Well charted!","Bravo!","Splendid!"],n:["Consult the atlas!","Not quite!","Try again!"]},
    agent:{y:["SIGNAL ACQUIRED","TARGET LOCATED","INTEL VERIFIED","ASSET CONFIRMED"],n:["SIGNAL LOST","COMPROMISED","REACQUIRE TARGET"]}
  };
  function showFeedback(ok) {
    const fb = FB[S.theme]||FB[""];
    const pool = ok ? fb.y : fb.n;
    const el = document.getElementById("feedback");
    el.textContent = pool[Math.floor(Math.random()*pool.length)];
    el.style.color = ok ? "var(--success)" : "var(--danger)";
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 900);
    // Audio
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      if (ok) { o.type="sine"; o.frequency.setValueAtTime(523,ctx.currentTime); o.frequency.exponentialRampToValueAtTime(784,ctx.currentTime+.1); }
      else { o.type="sawtooth"; o.frequency.setValueAtTime(200,ctx.currentTime); o.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+.2); }
      g.gain.setValueAtTime(.06,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
      o.start(); o.stop(ctx.currentTime+.25);
    } catch(e){}
  }

  function fireConfetti() {
    const c = {"":['#6b4226','#2d5016','#d4c4a0'],agent:['#00ff41','#003300','#66ff66']};
    window.confetti({particleCount:100,spread:60,origin:{y:.5},colors:c[S.theme]||c[""]});
  }

  // ==========================================
  // KEYBOARD (for desktop)
  // ==========================================
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeDrawers(); if (teachState.active) endTeach(); else endGame(); }
    if (teachState.active) {
      if (e.key === "ArrowRight") teachNext();
      if (e.key === "ArrowLeft") teachPrev();
    }
  });

  // Swipe support for teach mode (iPad)
  let _touchX = 0;
  document.addEventListener("touchstart", e => { _touchX = e.changedTouches[0].screenX; }, {passive:true});
  document.addEventListener("touchend", e => {
    if (!teachState.active) return;
    const dx = e.changedTouches[0].screenX - _touchX;
    if (Math.abs(dx) > 60) { if (dx > 0) teachPrev(); else teachNext(); }
  }, {passive:true});

  // Close info panel on tap outside
  document.getElementById("europe-map").addEventListener("click", e => {
    if (!e.target.classList.contains("eu-country")) {
      document.getElementById("info-panel").classList.remove("show");
    }
  });

  init();
</script>
</body>
</html>
